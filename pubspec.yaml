name: floatwatch
description: "FloatWatch — GCash Partner Outlet transaction tracker for Filipino store operators."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── Navigation ─────────────────────────────────────────────
  go_router: ^14.3.0

  # ── State Management ───────────────────────────────────────
  provider: ^6.1.2

  # ── Database ───────────────────────────────────────────────
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4

  # ── Typography ─────────────────────────────────────────────
  google_fonts: ^6.2.1

  # ── Security / Crypto ──────────────────────────────────────
  crypto: ^3.0.3

  # ── ID Generation ──────────────────────────────────────────
  uuid: ^4.5.1

  # ── Formatting ─────────────────────────────────────────────
  intl: ^0.19.0

  # ── Image Handling ─────────────────────────────────────────
  image_picker: ^1.1.2

  # ── OCR — dependency set up, integrate with ML Kit later ───
  # TODO: Activate google_mlkit_text_recognition for batch OCR feature
  google_mlkit_text_recognition: ^0.13.1

  # ── Firebase — DO NOT activate yet ─────────────────────────
  # Architecture is cloud-sync ready via repository pattern.
  # TODO: Activate Firebase packages when cloud sync feature is enabled.
  firebase_core: ^3.8.0
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0

  # ── Notifications ──────────────────────────────────────────
  flutter_local_notifications: ^18.0.0

  # ── Charts ─────────────────────────────────────────────────
  fl_chart: ^0.69.0

  # ── PDF Export — premium feature, set up but locked ────────
  # TODO: Unlock pdf export behind SubscriptionService.canExportPDF()
  pdf: ^3.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
